name: editorjs_flutter
description: "Flutter viewer and editor widgets for the EditorJS JSON schema. Supports 14 built-in block types with a Clean Architecture extension point for custom blocks."
version: 0.5.0-beta.1
homepage: https://labs.dev1.mx/editorjs-flutter
repository: https://github.com/DEV1-Softworks/editorjs-flutter
issue_tracker: https://github.com/DEV1-Softworks/editorjs-flutter/issues
topics:
  - editor
  - rich-text
  - editorjs
  - content

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_html: ^3.0.0-beta.2
  image_picker: ^1.0.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
